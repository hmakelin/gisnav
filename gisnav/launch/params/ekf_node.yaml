ekf_node:
  ros__parameters:
    odom_frame: "odom"
    base_link_frame: "base_link"
    world_frame: "map"
    publish_tf: true

    frequency: 10.0
    sensor_timeout: 5.0
    transform_time_offset: 0.0
    transform_timeout: 0.0

    use_sim_time: false
    two_d_mode: false

    print_diagnostics: true

    pose0: "/gisnav/pose_estimation_node/pose_with_covariance"
    pose0_config: [true,  true,  true,   # Position XYZ
                   false, false, false,  # Orientation (roll, pitch, yaw)
                   false, false, false,  # Velocity XYZ
                   false, false, false,  # Angular rates XYZ
                   false, false, false]  # Accelerations XYZ
